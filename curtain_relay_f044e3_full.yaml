# Relé de persianas LoraTap CB2S (BK7231N) — combina scripts de jojo99
# con exposición completa a HA/web (botones, invertir, reset, posición).
# Usa scripts para evitar el problema de interlock del cover anterior.

esphome:
  name: curtain-relay-f044e3
  friendly_name: "Persiana relé f044e3"

bk72xx:
  board: cb2s

logger:
  level: INFO

api:

ota:
  - platform: esphome

web_server:

captive_portal:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "curtain-relay-f044e3"
    password: ""

substitutions:
  up_pin: "P24"
  down_pin: "P26"
  btn_up_pin: "P23"
  btn_down_pin: "P21"
  btn_stop_pin: "P7"
  safety_timeout: "60s"

globals:
  - id: g_current_pos
    type: float
    restore_value: yes
    initial_value: "0.0"
  - id: g_target_pos
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: g_move_time_ms
    type: int
    restore_value: no
    initial_value: "0"

number:
  - platform: template
    name: "Tiempo subida (s)"
    id: num_up_time
    optimistic: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 30
    restore_value: true
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "Tiempo bajada (s)"
    id: num_down_time
    optimistic: true
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 30
    restore_value: true
    unit_of_measurement: "s"
    mode: box

switch:
  - platform: gpio
    id: sw_up
    name: "Relé subida"
    pin: ${up_pin}
    restore_mode: always off
    internal: true
    on_turn_on:
      - script.execute: safety_timeout
    on_turn_off:
      - script.stop: safety_timeout

  - platform: gpio
    id: sw_down
    name: "Relé bajada"
    pin: ${down_pin}
    restore_mode: always off
    internal: true
    on_turn_on:
      - script.execute: safety_timeout
    on_turn_off:
      - script.stop: safety_timeout

  - platform: template
    name: "Invertir sentido"
    id: sw_invert
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: 'id(sw_invert).publish_state(true);'
    turn_off_action:
      - lambda: 'id(sw_invert).publish_state(false);'

button:
  - platform: restart
    name: "Reiniciar"
  - platform: template
    name: "Posición 50 %"
    on_press:
      - lambda: 'id(move_to_position).execute(0.5f);'

  - platform: template
    name: "Subir"
    id: btn_open
    on_press:
      - script.execute: open_script

  - platform: template
    name: "Bajar"
    id: btn_close
    on_press:
      - script.execute: close_script

  - platform: template
    name: "Stop"
    id: btn_stop
    on_press:
      - script.execute: stop_script

binary_sensor:
  - platform: gpio
    id: btn_up
    name: "Botón subir"
    pin:
      number: ${btn_up_pin}
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - script.execute: open_script

  - platform: gpio
    id: btn_down
    name: "Botón bajar"
    pin:
      number: ${btn_down_pin}
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - script.execute: close_script

  - platform: gpio
    id: btn_stop_phys
    name: "Botón stop"
    pin:
      number: ${btn_stop_pin}
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - script.execute: stop_script

script:
  - id: open_script
    mode: restart
    then:
      - switch.turn_off: sw_down
      - delay: 500ms
      - switch.turn_on: sw_up

  - id: close_script
    mode: restart
    then:
      - switch.turn_off: sw_up
      - delay: 500ms
      - switch.turn_on: sw_down

  - id: stop_script
    then:
      - switch.turn_off: sw_up
      - switch.turn_off: sw_down

  - id: move_to_position
    mode: restart
    parameters:
      target: float
    then:
      - lambda: |-
          float current = id(g_current_pos);
          float target_pos = target;
          bool invert = id(sw_invert).state;
          float up_time = id(num_up_time).state;
          float down_time = id(num_down_time).state;

          if (fabs(target_pos - current) < 0.02f) {
            return;
          }

          id(g_target_pos) = target_pos;

          if (target_pos > current) {
            id(g_move_time_ms) = (target_pos - current) * up_time * 1000;
            if (invert) {
              id(sw_down).turn_on();
            } else {
              id(sw_up).turn_on();
            }
          } else {
            id(g_move_time_ms) = (current - target_pos) * down_time * 1000;
            if (invert) {
              id(sw_up).turn_on();
            } else {
              id(sw_down).turn_on();
            }
          }
      - delay: !lambda "return id(g_move_time_ms);"
      - lambda: |-
          id(sw_down).turn_off();
          id(sw_up).turn_off();
          id(g_current_pos) = id(g_target_pos);

  - id: safety_timeout
    mode: restart
    then:
      - delay: ${safety_timeout}
      - logger.log: "SAFETY TIMEOUT: apagando relés"
      - lambda: |-
          id(sw_down).turn_off();
          id(sw_up).turn_off();
